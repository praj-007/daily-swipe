name: greytHR Sign In
on:
  # schedule: disabled — runs are triggered externally by cron-job.org calling
  # the workflow_dispatch API at 09:30 IST; a random 0-15 min delay inside the job
  # lands the swipe between 09:30 and 09:45. (GitHub's schedule: is best-effort and
  # was delaying runs by hours). Re-enable by uncommenting the two lines below.
  # schedule:
  #   - cron: "41 3 * * 1-5"  # 09:11 IST (UTC = IST - 5:30)
  workflow_dispatch:        # allow manual runs for testing

jobs:
  signin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Decide whether today is a working day (IST)
        id: check
        run: python should_run.py
      - name: Random delay (0-15 min, so the swipe lands 09:30-09:45 IST)
        if: steps.check.outputs.should_run == 'true'
        run: |
          DELAY=$(( RANDOM % 901 ))
          echo "Delaying $((DELAY / 60))m $((DELAY % 60))s -> swipe ~$(TZ=Asia/Kolkata date -d "+${DELAY} seconds" '+%H:%M') IST"
          sleep "$DELAY"
      - name: Install Chromium browser
        if: steps.check.outputs.should_run == 'true'
        run: python -m playwright install --with-deps chromium
      - name: Sign in
        if: steps.check.outputs.should_run == 'true'
        env:
          GREYTHR_URL: ${{ secrets.GREYTHR_URL }}
          GREYTHR_USERNAME: ${{ secrets.GREYTHR_USERNAME }}
          GREYTHR_PASSWORD: ${{ secrets.GREYTHR_PASSWORD }}
        run: python attendance.py signin
      - name: Upload screenshot
        if: always() && steps.check.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: signin-screenshot
          path: screenshots/
          if-no-files-found: ignore
